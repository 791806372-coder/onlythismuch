<style>
    body {
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Geist', sans-serif;
    }
    .widget-container {
      width: 329px; /* iOS Medium Widget Width approx */
      height: 155px; /* iOS Medium Widget Height approx */
      aspect-ratio: 2.12 / 1;
    }
    .glass-effect {
      background: linear-gradient(135deg, rgba(26, 26, 26, 0.8) 0%, rgba(19, 19, 19, 0.9) 100%);

    }
    .inner-glow-border {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .usage-track {
      background: #000000;
      height: 4px;
      border-radius: 99px;
      overflow: hidden;
      width: 100%;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-black">
<div class="widget-container relative glass-effect rounded-[24px] p-4 flex flex-col overflow-hidden">

</div>

</div>
<div class="space-y-1.5 mt-1">
<!-- Meter 1 -->

<div class="absolute -top-12 -left-12 w-32 h-32 bg-primary/5 rounded-full blur-[40px] pointer-events-none"></div>

<script>
    // Micro-interaction for the refresh button
    const refreshBtn = document.querySelector('button');
    const refreshIcon = refreshBtn.querySelector('.material-symbols-outlined');
    
    refreshBtn.addEventListener('click', () => {
      refreshIcon.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
      refreshIcon.style.transform = 'rotate(180deg)';
      
      setTimeout(() => {
        refreshIcon.style.transition = 'none';
        refreshIcon.style.transform = 'rotate(0deg)';
      }, 500);
    });

    // Add subtle parallax-ish tilt effect on hover for desktop
    const widget = document.querySelector('.widget-container');
    widget.addEventListener('mousemove', (e) => {
      const rect = widget.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = (y - centerY) / 20;
      const rotateY = (centerX - x) / 20;
      
      widget.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    widget.addEventListener('mouseleave', () => {
      widget.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
      widget.style.transition = 'transform 0.5s ease';
    });

    widget.addEventListener('mouseenter', () => {
      widget.style.transition = 'none';
    });
  </script>
