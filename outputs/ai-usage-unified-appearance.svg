    <rect x="0" y="0" width="690" height="812" rx="78" fill="#0c1013"/>
    <rect x="17" y="17" width="656" height="778" rx="64" fill="url(#phoneBg)"/>
    <rect x="283" y="31" width="126" height="39" rx="20" fill="#050607"/>
    <text x="94" y="83" class="font white" font-size="30" font-weight="720">09:41</text>
    <text x="518" y="82" class="font white" font-size="23" font-weight="720">▮▮▮  Wi‑Fi</text>

    <!-- medium widget -->
    <g transform="translate(74 120)" filter="url(#innerLight)">
      <rect x="0" y="0" width="542" height="272" rx="36" fill="url(#mistPanel)" stroke="rgba(255,255,255,.24)" stroke-width="1.4"/>
      <rect x="10" y="10" width="522" height="252" rx="29" fill="url(#inkPanel)" stroke="rgba(255,255,255,.10)" stroke-width="1"/>
