        <text x="18" y="72" class="font white" font-size="19" font-weight="800">用量装神秘🙄</text>
        <text x="18" y="104" class="font muted" font-size="14" font-weight="560">官方又藏了</text>
      </g>
      <g transform="translate(300 0)">
        <rect width="132" height="132" rx="28" fill="url(#inkPanel)" stroke="rgba(255,255,255,.13)"/>
        <text x="18" y="32" class="font white" font-size="12" font-weight="760">别问了还剩这么点🤏</text>
        <text x="18" y="72" class="font white" font-size="20" font-weight="800">摸 Mac 中...🫳</text>
        <circle cx="67" cy="104" r="12" fill="none" stroke="rgba(255,255,255,.24)" stroke-width="4" stroke-dasharray="18 18"/>
      </g>
      <g transform="translate(450 0)">
        <rect width="132" height="132" rx="28" fill="url(#inkPanel)" stroke="rgba(255,255,255,.13)"/>
        <text x="18" y="32" class="font white" font-size="12" font-weight="760">别问了还剩这么点🤏</text>
        <text x="18" y="72" class="font white" font-size="20" font-weight="800">Mac 装睡了💤</text>
        <text x="18" y="104" class="font muted" font-size="14" font-weight="560">留着上次读数</text>
      </g>
    </g>
  </g>

