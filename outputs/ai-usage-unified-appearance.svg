<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <radialGradient id="boardBg" cx="30%" cy="16%" r="92%">
      <stop offset="0" stop-color="#eef4f6"/>
      <stop offset="0.34" stop-color="#c8d6dc"/>
      <stop offset="0.68" stop-color="#879aa2"/>
      <stop offset="1" stop-color="#4a5b61"/>
    </radialGradient>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172025"/>
      <stop offset="0.48" stop-color="#29363b"/>
      <stop offset="1" stop-color="#0f1518"/>
    </linearGradient>
    <linearGradient id="mistPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,.18)"/>
      <stop offset="0.48" stop-color="rgba(255,255,255,.08)"/>
      <stop offset="1" stop-color="rgba(7,12,15,.12)"/>
    </linearGradient>
    <linearGradient id="inkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22282b"/>
      <stop offset="0.52" stop-color="#171b1e"/>
      <stop offset="1" stop-color="#0f1214"/>
    </linearGradient>
    <linearGradient id="raisedPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f9fa"/>
      <stop offset="1" stop-color="#dfe8eb"/>
    </linearGradient>
    <linearGradient id="macChrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef4f5"/>
      <stop offset="1" stop-color="#c7d4d8"/>
    </linearGradient>
    <filter id="shadowBig" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="34" flood-color="#081014" flood-opacity=".30"/>
    </filter>
    <filter id="shadowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0b1419" flood-opacity=".17"/>
      <feDropShadow dx="0" dy="1" stdDeviation=".5" flood-color="#ffffff" flood-opacity=".38"/>
    </filter>
    <filter id="innerLight" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="-1" stdDeviation=".5" flood-color="#ffffff" flood-opacity=".35"/>
    </filter>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Apple Color Emoji", sans-serif; }
      .mono { font-family: "SF Mono", "SFMono-Regular", ui-monospace, Menlo, monospace; }
      .white { fill: #f7fbfc; }
      .mist { fill: rgba(247,251,252,.68); }
      .muted { fill: rgba(247,251,252,.48); }
      .ink { fill: #111619; }
      .ink2 { fill: #253037; }
      .softInk { fill: rgba(17,22,25,.64); }
      .orange { fill: #ff8751; }
      .green { fill: #39d468; }
      .label { fill: rgba(247,251,252,.92); font-size: 20px; font-weight: 520; }
      .pct { fill: #ffffff; font-size: 30px; font-weight: 790; }
      .small { font-size: 16px; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#boardBg)"/>
  <g opacity=".24">
    <ellipse cx="230" cy="880" rx="460" ry="160" fill="#182428"/>
    <ellipse cx="980" cy="130" rx="520" ry="180" fill="#ffffff"/>
    <ellipse cx="1270" cy="830" rx="390" ry="170" fill="#394b51"/>
  </g>

  <text x="54" y="70" class="font ink" font-size="30" font-weight="820">AI Usage · Unified Graphite Mist</text>
  <text x="54" y="106" class="font softInk" font-size="17" font-weight="620">One appearance. Same material language across widget, iPhone app, Mac connector, and states.</text>

