      <line x1="270" y1="76" x2="270" y2="232" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
      <text x="30" y="102" class="font orange" font-size="26" font-weight="800">Claude</text>
      <text x="30" y="140" class="label">5h</text>
      <text x="222" y="140" class="pct">3%</text>
      <rect x="30" y="157" width="200" height="10" rx="5" fill="rgba(255,255,255,.24)"/>
      <rect x="30" y="157" width="8" height="10" rx="5" fill="#ff8751"/>
      <text x="30" y="191" class="font small muted">22:06 恢复</text>
      <text x="30" y="224" class="label">周</text>
      <text x="222" y="224" class="pct">0%</text>
      <rect x="30" y="239" width="200" height="10" rx="5" fill="rgba(255,255,255,.24)"/>
      <text x="30" y="265" class="font small muted">6月16日 恢复</text>

      <text x="300" y="102" class="font green" font-size="26" font-weight="800">Codex</text>
      <text x="300" y="140" class="label">5h</text>
      <text x="472" y="140" class="pct">99%</text>
      <rect x="300" y="157" width="200" height="10" rx="5" fill="rgba(255,255,255,.24)"/>
      <rect x="300" y="157" width="198" height="10" rx="5" fill="#39d468"/>
      <text x="300" y="191" class="font small muted">22:06 恢复</text>
      <text x="300" y="224" class="label">周</text>
      <text x="472" y="224" class="pct">94%</text>
      <rect x="300" y="239" width="200" height="10" rx="5" fill="rgba(255,255,255,.24)"/>
      <rect x="300" y="239" width="188" height="10" rx="5" fill="#39d468"/>
      <text x="300" y="265" class="font small muted">6月16日 恢复</text>
    </g>

    <text x="315" y="438" class="font white" font-size="21" font-weight="650">AI Usage</text>

    <!-- state cards -->
    <g transform="translate(74 520)">
      <g>
        <rect width="132" height="132" rx="28" fill="url(#inkPanel)" stroke="rgba(255,255,255,.13)"/>
        <text x="18" y="32" class="font white" font-size="12" font-weight="760">别问了还剩这么点🤏</text>
        <text x="18" y="68" class="font orange" font-size="18" font-weight="780">Claude</text>
        <rect x="18" y="88" width="76" height="8" rx="4" fill="rgba(255,255,255,.24)"/>
        <rect x="18" y="88" width="60" height="8" rx="4" fill="#ff9d2f"/>
