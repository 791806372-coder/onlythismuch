<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <radialGradient id="sky" cx="24%" cy="22%" r="82%">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.38" stop-color="#b8d0dc"/>
      <stop offset="0.72" stop-color="#6f8793"/>
      <stop offset="1" stop-color="#27323a"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6e8791"/>
      <stop offset="0.5" stop-color="#d9c4a4"/>
      <stop offset="1" stop-color="#2e4545"/>
    </linearGradient>
    <linearGradient id="glassDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,.34)"/>
      <stop offset="0.42" stop-color="rgba(44,59,66,.62)"/>
      <stop offset="1" stop-color="rgba(13,18,22,.72)"/>
    </linearGradient>
    <linearGradient id="glassLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,.82)"/>
      <stop offset="1" stop-color="rgba(255,255,255,.48)"/>
    </linearGradient>
    <filter id="blurBg">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0b1115" flood-opacity=".18"/>
      <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-color="#ffffff" flood-opacity=".46"/>
    </filter>
    <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="34" flood-color="#0c1115" flood-opacity=".28"/>
    </filter>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Apple Color Emoji", sans-serif; }
      .mono { font-family: "SF Mono", "SFMono-Regular", ui-monospace, Menlo, monospace; }
      .white { fill: #fbfdff; }
      .mist { fill: rgba(255,255,255,.72); }
      .ink { fill: #101318; }
      .sub { fill: rgba(16,19,24,.56); }
      .wlabel { fill: rgba(255,255,255,.92); font-size: 21px; font-weight: 560; }
      .wpct { fill: #ffffff; font-size: 30px; font-weight: 780; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <g opacity=".5" filter="url(#blurBg)">
