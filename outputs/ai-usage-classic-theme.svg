    <linearGradient id="widgetBlack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#272527"/>
      <stop offset="0.55" stop-color="#171719"/>
      <stop offset="1" stop-color="#101114"/>
