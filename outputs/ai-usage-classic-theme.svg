      .mono { font-family: "SF Mono", "SFMono-Regular", ui-monospace, Menlo, monospace; }
      .muted { fill: rgba(255,255,255,.56); }
      .darkMuted { fill: #7e858c; }
      .label { fill: #f7f7f8; font-size: 21px; font-weight: 500; }
      .pct { fill: #f8f8f9; font-size: 30px; font-weight: 760; }
      .small { font-size: 17px; }
      .caption { fill: #80858d; font-size: 18px; font-weight: 560; }
