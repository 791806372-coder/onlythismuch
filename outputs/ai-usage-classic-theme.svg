      <stop offset="0" stop-color="#ecf1f5"/>
      <stop offset="0.45" stop-color="#dfe7ee"/>
      <stop offset="1" stop-color="#f7f8fa"/>
    </linearGradient>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1" y2="1">
