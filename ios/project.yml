name: AIUsageWidget
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 2
configFiles:
  Debug: Config/Local.xcconfig
  Release: Config/Local.xcconfig
targets:
  AIUsageWidgetApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AIUsageWidgetApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(PRODUCT_BUNDLE_IDENTIFIER_PREFIX).aiusagewidget
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: AIUsageWidgetApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: AIUsageWidgetApp/AIUsageWidgetApp.entitlements
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - target: AIUsageWidgetExtension
        embed: true

  AIUsageWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AIUsageWidgetExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(PRODUCT_BUNDLE_IDENTIFIER_PREFIX).aiusagewidget.widget
        INFOPLIST_FILE: AIUsageWidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: AIUsageWidgetExtension/AIUsageWidgetExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: true
        TARGETED_DEVICE_FAMILY: 1

  AIUsageWidgetTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AIUsageWidgetTests
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(PRODUCT_BUNDLE_IDENTIFIER_PREFIX).aiusagewidget.tests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: AIUsageWidgetApp

schemes:
  AIUsageWidgetTests:
    build:
      targets:
        AIUsageWidgetTests: all
    test:
      targets:
        - AIUsageWidgetTests
